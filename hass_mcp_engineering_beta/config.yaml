name: HA MCP Engineering Server Beta
version: "2.0.0-beta.15"
slug: hass_mcp_engineering_beta
description: Modular v2 beta scaffold for Home Assistant MCP engineering workflows
url: https://github.com/jeter-1/hass-mcp-admin
arch:
  - amd64
  - aarch64
  - armv7
init: false
homeassistant_api: true
map:
  - homeassistant_config:ro
ports:
  8100/tcp: 8100
ports_description:
  8100/tcp: Beta MCP streamable-HTTP endpoint
options:
  access_secret: ""
  rate_limit_per_minute: 120
  rate_limit_burst: 25
  audit_enabled: true
  audit_path: /data/audit.jsonl
  audit_max_payload_chars: 8192
  log_level: INFO
  ha_timeout_seconds: 60
  response_size_limit: 60000
  redaction_enabled: true
  destructive_services:
    - lock.unlock
    - lock.open
    - cover.open_cover
    - alarm_control_panel.alarm_disarm
    - homeassistant.restart
    - homeassistant.stop
schema:
  access_secret: str
  rate_limit_per_minute: int
  rate_limit_burst: int
  audit_enabled: bool
  audit_path: str
  audit_max_payload_chars: int
  log_level: list(DEBUG|INFO|WARNING|ERROR)
  ha_timeout_seconds: float
  response_size_limit: int
  redaction_enabled: bool
  destructive_services:
    - str
