name: Promote staged Engineering release

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: hass-mcp-engineering-release-promotion
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/jeter-1/hass-mcp-engineering-beta

jobs:
  validate:
    name: Complete validation gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  detect-release:
    name: Detect Engineering release transition
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_promote: ${{ steps.detect.outputs.should_promote }}
      release_mode: ${{ steps.detect.outputs.release_mode }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f .release/next-version ]]; then
            echo "should_promote=true" >> "$GITHUB_OUTPUT"
            echo "release_mode=staged" >> "$GITHUB_OUTPUT"
          elif [[ "$(git log -1 --pretty=%s)" == "Promote HA MCP Engineering Server "* ]]; then
            echo "should_promote=false" >> "$GITHUB_OUTPUT"
            echo "release_mode=none" >> "$GITHUB_OUTPUT"
            echo "The atomic release commit is already promoted." >> "$GITHUB_STEP_SUMMARY"
          else
            before="${{ github.event.before }}"
            current_version="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' hass_mcp_engineering_beta/config.yaml)"
            previous_version=""
            if [[ "$before" =~ ^[0-9a-f]{40}$ ]] && git cat-file -e "${before}^{commit}" 2>/dev/null; then
              previous_version="$(git show "${before}:hass_mcp_engineering_beta/config.yaml" | sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p')"
            fi
            if [[ -n "$current_version" && -n "$previous_version" && "$current_version" != "$previous_version" ]]; then
              echo "should_promote=true" >> "$GITHUB_OUTPUT"
              echo "release_mode=preversioned" >> "$GITHUB_OUTPUT"
            else
              echo "should_promote=false" >> "$GITHUB_OUTPUT"
              echo "release_mode=none" >> "$GITHUB_OUTPUT"
              echo "No staged declaration or Engineering version transition is present." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

  promote:
    name: Publish, verify, and atomically promote
    needs:
      - validate
      - detect-release
    if: needs.detect-release.outputs.should_promote == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_MODE: ${{ needs.detect-release.outputs.release_mode }}
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.prepare.outputs.version }}
      release_sha: ${{ steps.prepare.outputs.release_sha }}
      digest: ${{ steps.build.outputs.digest }}
      image_published: ${{ steps.build.outcome == 'success' }}
      image_verified: ${{ steps.verify.outputs.image_verified }}
      tag_created: ${{ steps.finalize.outputs.tag_created }}
      tag_verified: ${{ steps.finalize.outputs.tag_verified }}
      release_complete: ${{ steps.finalize.outputs.release_complete }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            hass_mcp_admin/requirements-dev.txt
            hass_mcp_engineering_beta/requirements.txt
            tests/requirements.txt

      - name: Install release validation dependencies
        run: >-
          python -m pip install
          -r hass_mcp_admin/requirements-dev.txt
          -r hass_mcp_engineering_beta/requirements.txt
          -r tests/requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Prepare local immutable release commit
        id: prepare
        shell: bash
        run: |
          set -euo pipefail

          source_main_sha="$(git rev-parse HEAD)"
          remote_main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [[ "$source_main_sha" != "$GITHUB_SHA" || "$remote_main_sha" != "$source_main_sha" ]]; then
            echo "::error::The workflow checkout is not the exact current main commit."
            exit 1
          fi

          current_version="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' hass_mcp_engineering_beta/config.yaml)"
          validation_base="$source_main_sha"
          deployed_version="$current_version"
          if [[ "$RELEASE_MODE" == "staged" ]]; then
            python scripts/promote_next_release.py
            version="$(tr -d '\r\n' < .release/next-version)"
          elif [[ "$RELEASE_MODE" == "preversioned" ]]; then
            validation_base="${{ github.event.before }}"
            deployed_version="$(git show "${validation_base}:hass_mcp_engineering_beta/config.yaml" | sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p')"
            version="$current_version"
          else
            echo "::error::The release detector returned an unsupported mode."
            exit 1
          fi
          release_tag="v${version}"

          if git ls-remote --exit-code --tags origin "refs/tags/${release_tag}" >/dev/null 2>&1; then
            echo "::error::The immutable release tag ${release_tag} already exists."
            exit 1
          fi

          bash scripts/assert_registry_tags_absent.sh \
            "${IMAGE_REPOSITORY}:${version}"

          if [[ "$RELEASE_MODE" == "staged" ]]; then
            python scripts/promote_next_release.py --apply
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- \
              hass_mcp_engineering_beta/config.yaml \
              hass_mcp_engineering_beta/ha_mcp_engineering/version.py \
              scripts/validate_addon_metadata.py
            git add -A -- .release/next-version
            git commit -m "Promote HA MCP Engineering Server ${version}"
          elif [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::The reviewed pre-versioned release checkout is not clean."
            exit 1
          fi
          release_sha="$(git rev-parse HEAD)"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ || ! "$build_time" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]; then
            echo "::error::Release provenance is not a bounded commit SHA and UTC RFC3339 timestamp."
            exit 1
          fi

          bash scripts/assert_registry_tags_absent.sh \
            "${IMAGE_REPOSITORY}:sha-${release_sha}"

          python scripts/validate_addon_metadata.py \
            --repo-root . \
            --base-ref "$validation_base" \
            --expected-version "$version" \
            --deployed-version "$deployed_version"
          python -m compileall -q hass_mcp_admin hass_mcp_engineering_beta tests
          python -m unittest discover -s tests -v
          git diff --check "$validation_base..HEAD"

          {
            echo "source_main_sha=$source_main_sha"
            echo "current_version=$current_version"
            echo "deployed_version=$deployed_version"
            echo "release_mode=$RELEASE_MODE"
            echo "version=$version"
            echo "release_tag=$release_tag"
            echo "release_sha=$release_sha"
            echo "build_time=$build_time"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64,arm

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish local release commit
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./hass_mcp_engineering_beta
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            BUILD_VERSION=${{ steps.prepare.outputs.version }}
            HAMCP_BUILD_SHA=${{ steps.prepare.outputs.release_sha }}
            HAMCP_BUILD_TIME=${{ steps.prepare.outputs.build_time }}
            HAMCP_BUILD_DIRTY=false
          tags: |
            ghcr.io/jeter-1/hass-mcp-engineering-beta:${{ steps.prepare.outputs.version }}
            ghcr.io/jeter-1/hass-mcp-engineering-beta:sha-${{ steps.prepare.outputs.release_sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/jeter-1/hass-mcp-admin
            org.opencontainers.image.revision=${{ steps.prepare.outputs.release_sha }}
            org.opencontainers.image.created=${{ steps.prepare.outputs.build_time }}
            org.opencontainers.image.version=${{ steps.prepare.outputs.version }}
            io.hass-mcp.build.dirty=false

      - name: Verify immutable tags, architectures, and provenance anonymously
        id: verify
        shell: bash
        env:
          EXPECTED_DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_SHA: ${{ steps.prepare.outputs.release_sha }}
          BUILD_TIME: ${{ steps.prepare.outputs.build_time }}
          VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          set -euo pipefail

          anonymous_config="$RUNNER_TEMP/anonymous-docker"
          mkdir -p "$anonymous_config"
          version_image="${IMAGE_REPOSITORY}:${VERSION}"
          sha_image="${IMAGE_REPOSITORY}:sha-${RELEASE_SHA}"
          manifest_json="$RUNNER_TEMP/release-manifest.json"
          version_inspect="$RUNNER_TEMP/version-inspect.txt"
          sha_inspect="$RUNNER_TEMP/sha-inspect.txt"

          DOCKER_CONFIG="$anonymous_config" docker buildx imagetools inspect --raw \
            "$version_image" > "$manifest_json"
          DOCKER_CONFIG="$anonymous_config" docker buildx imagetools inspect \
            "$version_image" > "$version_inspect"
          DOCKER_CONFIG="$anonymous_config" docker buildx imagetools inspect \
            "$sha_image" > "$sha_inspect"

          python - "$manifest_json" <<'PY'
          import json
          import pathlib
          import sys

          manifest = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          actual = {
              (
                  item.get("platform", {}).get("os"),
                  item.get("platform", {}).get("architecture"),
                  item.get("platform", {}).get("variant"),
              )
              for item in manifest.get("manifests", [])
          }
          required = {
              ("linux", "amd64", None),
              ("linux", "arm64", None),
              ("linux", "arm", "v7"),
          }
          missing = required - actual
          if missing:
              raise SystemExit(f"multi-architecture manifest is missing: {sorted(missing)!r}")
          attestations = [
              item for item in manifest.get("manifests", [])
              if item.get("annotations", {}).get("vnd.docker.reference.type") == "attestation-manifest"
          ]
          if len(attestations) < len(required):
              raise SystemExit("SLSA provenance/SBOM attestations are missing for one or more platforms")
          PY

          version_digest="$(awk '$1 == "Digest:" { print $2; exit }' "$version_inspect")"
          sha_digest="$(awk '$1 == "Digest:" { print $2; exit }' "$sha_inspect")"
          if [[ -z "$EXPECTED_DIGEST" || "$version_digest" != "$EXPECTED_DIGEST" || "$sha_digest" != "$EXPECTED_DIGEST" ]]; then
            echo "::error::The version and release-commit tags do not share the published immutable digest."
            exit 1
          fi

          DOCKER_CONFIG="$anonymous_config" docker pull --platform linux/amd64 "$version_image"
          actual_revision="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          actual_created="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "org.opencontainers.image.created" }}')"
          actual_version="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "org.opencontainers.image.version" }}')"
          actual_source="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
          if [[ "$actual_revision" != "$RELEASE_SHA" || "$actual_created" != "$BUILD_TIME" || "$actual_version" != "$VERSION" || "$actual_source" != "https://github.com/jeter-1/hass-mcp-admin" ]]; then
            echo "::error::The anonymously pulled image provenance does not match the local release commit."
            exit 1
          fi
          actual_dirty="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "io.hass-mcp.build.dirty" }}')"
          if [[ "$actual_dirty" != "false" ]]; then
            echo "::error::The release image dirty-tree label is not false."
            exit 1
          fi
          reference_labels="$actual_revision|$actual_created|$actual_version|$actual_dirty"
          for platform in linux/arm64 linux/arm/v7; do
            DOCKER_CONFIG="$anonymous_config" docker pull --platform "$platform" "$version_image"
            platform_labels="$(docker image inspect "$version_image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}|{{ index .Config.Labels "org.opencontainers.image.created" }}|{{ index .Config.Labels "org.opencontainers.image.version" }}|{{ index .Config.Labels "io.hass-mcp.build.dirty" }}')"
            if [[ "$platform_labels" != "$reference_labels" ]]; then
              echo "::error::Platform $platform does not share release revision, version, creation time, and dirty=false provenance."
              exit 1
            fi
          done
          {
            echo "image_verified=true"
            echo "manifest_digest=$version_digest"
            echo "sbom_status=present"
          } >> "$GITHUB_OUTPUT"

      - name: Finalize release commit and annotated tag
        id: finalize
        shell: bash
        env:
          RELEASE_SHA: ${{ steps.prepare.outputs.release_sha }}
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
          SOURCE_MAIN_SHA: ${{ steps.prepare.outputs.source_main_sha }}
          VERSION: ${{ steps.prepare.outputs.version }}
          BUILD_TIME: ${{ steps.prepare.outputs.build_time }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_MODE: ${{ steps.prepare.outputs.release_mode }}
        run: |
          set -euo pipefail

          remote_main_sha="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          if [[ "$remote_main_sha" != "$SOURCE_MAIN_SHA" ]]; then
            echo "::error::Main changed after publication; refusing to promote or overwrite it."
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]]; then
            echo "::error::The local release commit changed after image publication."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git_name="$(git config --get user.name)"
          git_email="$(git config --get user.email)"
          if [[ -z "$git_name" || -z "$git_email" ]]; then
            echo "::error::Annotated-tag identity is empty."
            exit 1
          fi

          annotation="$(printf 'HA MCP Engineering Server %s\nVersion: %s\nSource SHA: %s\nImage digest: %s\nBuild timestamp: %s' "$VERSION" "$VERSION" "$RELEASE_SHA" "$IMAGE_DIGEST" "$BUILD_TIME")"
          git tag -a "$RELEASE_TAG" "$RELEASE_SHA" -m "$annotation"
          local_tag="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          if [[ "$local_tag" != "$RELEASE_SHA" ]]; then
            echo "::error::The local annotated tag does not resolve to release_sha."
            exit 1
          fi
          echo "tag_created=true" >> "$GITHUB_OUTPUT"

          if [[ "$RELEASE_MODE" == "staged" ]]; then
            git push --atomic origin \
              "HEAD:refs/heads/main" \
              "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          else
            if [[ "$remote_main_sha" != "$RELEASE_SHA" ]]; then
              echo "::error::The pre-versioned release SHA is not current main."
              exit 1
            fi
            git push origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          fi

          promoted_main="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
          promoted_tag="$(git ls-remote origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}')"
          if [[ "$promoted_main" != "$RELEASE_SHA" || "$promoted_tag" != "$RELEASE_SHA" ]]; then
            echo "::error::Remote main and the annotated release tag do not resolve to the release commit."
            exit 1
          fi
          {
            echo "tag_verified=true"
            echo "release_complete=true"
          } >> "$GITHUB_OUTPUT"

      - name: Write promotion and reconciliation summary
        if: always()
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          RELEASE_SHA: ${{ steps.prepare.outputs.release_sha }}
          RELEASE_TAG: ${{ steps.prepare.outputs.release_tag }}
          VERSION: ${{ steps.prepare.outputs.version }}
          IMAGE_PUBLISHED: ${{ steps.build.outcome == 'success' }}
          IMAGE_VERIFIED: ${{ steps.verify.outputs.image_verified || 'false' }}
          TAG_CREATED: ${{ steps.finalize.outputs.tag_created || 'false' }}
          TAG_VERIFIED: ${{ steps.finalize.outputs.tag_verified || 'false' }}
          RELEASE_COMPLETE: ${{ steps.finalize.outputs.release_complete || 'false' }}
        run: |
          {
            if [[ "$RELEASE_COMPLETE" == "true" ]]; then
              echo "### Engineering release promoted"
            else
              echo "### Engineering release promotion requires reconciliation"
            fi
            echo "- Version: $VERSION"
            echo "- Tag: $RELEASE_TAG"
            echo "- Release commit: $RELEASE_SHA"
            echo "- Version image: ${IMAGE_REPOSITORY}:${VERSION}"
            echo "- Commit image: ${IMAGE_REPOSITORY}:sha-${RELEASE_SHA}"
            echo "- OCI digest: $DIGEST"
            echo "- Architectures: linux/amd64, linux/arm64, linux/arm/v7"
            echo "- image_published: $IMAGE_PUBLISHED"
            echo "- image_verified: $IMAGE_VERIFIED"
            echo "- manifest_digest: ${DIGEST:-not-published}"
            echo "- tag_created: $TAG_CREATED"
            echo "- tag_verified: $TAG_VERIFIED"
            echo "- release_complete: $RELEASE_COMPLETE"
            echo "- The workflow did not force-push or overwrite main."
            if [[ "$RELEASE_COMPLETE" == "true" ]]; then
              echo "- Operator action: refresh the Home Assistant add-on store if needed, then update Engineering Beta."
            elif [[ "$IMAGE_PUBLISHED" == "true" ]]; then
              echo "- Failed phase: tag finalization or later verification."
              echo "- Recovery: verify the existing digest, OCI revision, version, and anonymous access before retrying only tag finalization. Do not rebuild or overwrite the immutable image tag."
            else
              echo "- Failed phase: validation, build, publication, or anonymous verification."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
