name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            hass_mcp_admin/requirements.txt
            hass_mcp_admin/requirements-dev.txt
      - name: Install dependencies
        run: python -m pip install -r hass_mcp_admin/requirements-dev.txt
      - name: Compile Python
        run: python -m compileall -q hass_mcp_admin tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate add-on YAML
        run: python -c "import pathlib,yaml; yaml.safe_load(pathlib.Path('hass_mcp_admin/config.yaml').read_text()); yaml.safe_load(pathlib.Path('repository.yaml').read_text())"
