name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            hass_mcp_admin/requirements.txt
            hass_mcp_admin/requirements-dev.txt
            hass_mcp_engineering_beta/requirements.txt
            tests/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r hass_mcp_admin/requirements-dev.txt -r hass_mcp_engineering_beta/requirements.txt -r tests/requirements.txt
      - name: Compile Python
        run: python -m compileall -q hass_mcp_admin hass_mcp_engineering_beta tests
      - name: Validate deployment metadata
        run: python scripts/validate_addon_metadata.py --repo-root . --base-ref origin/main
      - name: Validate PowerShell deployment script syntax
        shell: pwsh
        run: '[scriptblock]::Create((Get-Content -Raw "scripts/deploy-beta.ps1")) | Out-Null'
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate add-on YAML
        run: python -c "import pathlib,yaml; yaml.safe_load(pathlib.Path('hass_mcp_admin/config.yaml').read_text()); yaml.safe_load(pathlib.Path('hass_mcp_engineering_beta/config.yaml').read_text()); yaml.safe_load(pathlib.Path('repository.yaml').read_text())"
      - name: Set up QEMU for declared RC architectures
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64,arm
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build production image
        run: docker build -t hass-mcp-admin:test ./hass_mcp_admin
      - name: Build beta image
        shell: bash
        run: |
          beta_version="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' hass_mcp_engineering_beta/config.yaml)"
          build_sha="$(git rev-parse HEAD)"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          docker build \
            --build-arg "BUILD_VERSION=$beta_version" \
            --build-arg "HAMCP_BUILD_SHA=$build_sha" \
            --build-arg "HAMCP_BUILD_TIME=$build_time" \
            -t hass-mcp-engineering-beta:test \
            ./hass_mcp_engineering_beta
      - name: Validate beta image on every declared architecture without pushing
        shell: bash
        run: |
          beta_version="$(sed -nE 's/^version:[[:space:]]*"?([^"[:space:]]+)"?[[:space:]]*$/\1/p' hass_mcp_engineering_beta/config.yaml)"
          build_sha="$(git rev-parse HEAD)"
          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          docker buildx build \
            --platform "linux/amd64,linux/arm64,linux/arm/v7" \
            --build-arg "BUILD_VERSION=$beta_version" \
            --build-arg "HAMCP_BUILD_SHA=$build_sha" \
            --build-arg "HAMCP_BUILD_TIME=$build_time" \
            --output=type=cacheonly \
            ./hass_mcp_engineering_beta

  real-ha-contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      HA_CONTRACT_VERSION: "2026.7.2"
      HA_CONTRACT_IMAGE: "ghcr.io/home-assistant/home-assistant:2026.7.2@sha256:1476924357b46e80735c13e94232ba5c853cac052e9df4bb28d50fa56348097b"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: hass_mcp_engineering_beta/requirements.txt
      - name: Install Engineering client dependencies
        run: python -m pip install -r hass_mcp_engineering_beta/requirements.txt
      - name: Start disposable pinned Home Assistant Core
        shell: bash
        run: |
          set -euo pipefail
          contract_dir="$RUNNER_TEMP/beta25-real-ha"
          mkdir -p "$contract_dir"
          printf '%s\n' \
            'default_config:' \
            'automation: !include automations.yaml' \
            > "$contract_dir/configuration.yaml"
          : > "$contract_dir/automations.yaml"
          docker pull "$HA_CONTRACT_IMAGE"
          docker run -d --name beta25-real-ha -p 8123:8123 \
            -v "$contract_dir:/config" "$HA_CONTRACT_IMAGE"
          echo "HA contract version: $HA_CONTRACT_VERSION"
          docker image inspect "$HA_CONTRACT_IMAGE" \
            --format='HA contract image digest: {{index .RepoDigests 0}}'
      - name: Run real Home Assistant contracts
        env:
          REAL_HA_URL: http://127.0.0.1:8123
        run: python scripts/real_ha_contract_tests.py
      - name: Sanitize and remove disposable Home Assistant
        if: always()
        shell: bash
        run: |
          docker rm -f beta25-real-ha >/dev/null 2>&1 || true
          sudo rm -rf "$RUNNER_TEMP/beta25-real-ha"
